    <script>
// از URL مرورگر پارامترها رو میخونیم
const params = new URLSearchParams(window.location.search);
// مقدار "group" رو از URL میگیریم و تبدیل به عدد میکنیم
const groupId = Number(params.get("group"));

// توی آرایه product_groups دنبال گروهی میگردیم که group_id اون با groupId برابر باشه
const group = data.product_groups.find(function(g) {
    return g.group_id === groupId;
});

if (group) {
    // عنوان گروه رو توی دو جای صفحه نشون میدیم
    document.getElementById("food_title1").textContent = group.group_title;
    document.getElementById("food_title2").textContent = group.group_title;

    const foodList = document.getElementById("food_list");
    foodList.innerHTML = "";

    // روی هر محصول توی اون گروه حلقه میزنیم
    group.group_products.forEach(function(product) {
        // برای هر محصول یه li میسازیم
        const li = document.createElement("li");
        li.innerHTML = `
            <div class="food-info">
                <span class="food-title">${product.product_name}</span>
                <span class="food-price">${product.product_price.toLocaleString()} تومان</span>
            </div>
            <div class="food-content">${product.product_content.join(" / ")}</div>
        `;

        // داخل همین حلقه، هنوز به product دسترسی داریم
        // پس میتونیم مستقیم product_id رو بگیریم
        const foodTitle = li.querySelector(".food-title");
        foodTitle.addEventListener('click', function() {
            // وقتی کلیک شد، آدرس رو عوض میکنیم و group و product رو اضافه میکنیم
            window.location.href = "food_details.html?group=" + groupId + "&product=" + product.product_id;
        });

        // li ساخته شده رو به ul اضافه میکنیم
        foodList.appendChild(li);
    });

} else {
    document.getElementById("food_title1").textContent = "گروه یافت نشد";
    document.getElementById("food_title2").textContent = "گروه یافت نشد";
}
    </script>
